<style>
  html, body { margin: 0; padding: 0; background-color: #FAF4E6; }
  #root { min-height: 100vh; }

  /* ============ INTRO: KOREAN INK-BRUSH REVEAL (≈2s) ============ */
  .fw-intro {
    position: fixed; inset: 0; z-index: 9999;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #FAF4E6;
    overflow: hidden;
    animation: fwIntroExit 0.5s cubic-bezier(0.7, 0, 0.84, 0) 2.0s forwards;
  }
  /* warm paper glow */
  .fw-intro::before {
    content: ""; position: absolute; inset: 0;
    background:
      radial-gradient(circle at 50% 48%, rgba(184,155,90,0.10) 0%, transparent 58%),
      radial-gradient(circle at 50% 48%, rgba(160,40,40,0.03) 0%, transparent 62%);
  }

  /* Stage that holds the brush + text */
  .fw-brush-stage {
    position: relative;
    width: min(560px, 86vw);
    display: flex; flex-direction: column; align-items: center;
  }

  /* The ink brush sweep (SVG sits on top, animated via stroke-dashoffset) */
  .fw-brush-svg {
    width: 100%;
    height: auto;
    overflow: visible;
  }
  .fw-brush-path {
    fill: none;
    stroke: #A02828;
    stroke-width: 34;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 1100;
    stroke-dashoffset: 1100;
    filter: url(#fwInkTexture);
    animation: fwBrushDraw 0.95s cubic-bezier(0.65, 0, 0.35, 1) 0.25s forwards;
  }
  /* a second, lighter trailing stroke for ink depth */
  .fw-brush-path2 {
    fill: none;
    stroke: #8C1F1F;
    stroke-width: 12;
    stroke-linecap: round;
    opacity: 0.55;
    stroke-dasharray: 1100;
    stroke-dashoffset: 1100;
    animation: fwBrushDraw 0.95s cubic-bezier(0.65, 0, 0.35, 1) 0.32s forwards;
  }

  /* Wordmark revealed by a clip wipe that follows the brush */
  .fw-brush-word {
    position: absolute;
    top: 50%; left: 0; right: 0;
    transform: translateY(-50%);
    text-align: center;
    font-family: 'Fraunces', Georgia, serif;
    font-size: clamp(34px, 8vw, 58px); font-weight: 600; letter-spacing: -0.02em;
    color: #FAF4E6;
    white-space: nowrap;
    /* reveal left-to-right in sync with the brush */
    clip-path: inset(0 100% 0 0);
    animation: fwWordWipe 0.85s cubic-bezier(0.65, 0, 0.35, 1) 0.55s forwards;
    pointer-events: none;
  }
  .fw-brush-word .w { font-style: italic; font-weight: 300; }

  /* Korean tagline fades up after the stroke lands */
  .fw-brush-ko {
    margin-top: 26px;
    font-family: 'Noto Serif KR', serif; font-weight: 600;
    font-size: clamp(12px, 3.4vw, 15px); letter-spacing: 0.2em; color: #B89B5A;
    opacity: 0;
    transform: translateY(8px);
    animation: fwKoIn 0.6s ease-out 1.35s forwards;
  }

  @keyframes fwBrushDraw {
    to { stroke-dashoffset: 0; }
  }
  @keyframes fwWordWipe {
    0%   { clip-path: inset(0 100% 0 0); }
    100% { clip-path: inset(0 0 0 0); }
  }
  @keyframes fwKoIn {
    0%   { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes fwIntroExit {
    0%   { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.03); visibility: hidden; }
  }

  /* Respect reduced-motion: skip the brush sweep, do a calm fade */
  @media (prefers-reduced-motion: reduce) {
    .fw-brush-path, .fw-brush-path2 { animation: none; stroke-dashoffset: 0; }
    .fw-brush-word { animation: none; clip-path: inset(0 0 0 0); }
    .fw-brush-ko { animation: fwKoIn 0.4s ease-out 0.2s forwards; }
    .fw-intro { animation: fwIntroExit 0.4s ease 1.2s forwards; }
  }
</style>

// Render the site immediately (behind the intro overlay) so it's ready
// the moment the hanko intro lifts away.
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(FixWithKim));

// Remove the intro overlay from the DOM once its exit animation finishes
// (~2.5s total). Falls back to a timeout in case animationend doesn't fire.
(function () {
  const intro = document.getElementById('fw-intro');
  if (!intro) return;
  let done = false;
  const cleanup = function () {
    if (done) return;
    done = true;
    intro.style.display = 'none';
    if (intro.parentNode) intro.parentNode.removeChild(intro);
  };
  intro.addEventListener('animationend', function (e) {
    // Only clean up on the overlay's own exit animation
    if (e.animationName === 'fwIntroExit') cleanup();
  });
  setTimeout(cleanup, 3000); // safety fallback
})();
</script>
